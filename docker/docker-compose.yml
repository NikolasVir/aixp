services:
  ollama:
    image: ollama/ollama
    container_name: aixp-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-init:
    image: ollama/ollama
    container_name: aixp-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2 && ollama pull bge-m3"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: aixp-api
    environment:
      - OllamaSettings__BaseUrl=http://ollama:11434
      - OllamaSettings__Model=llama3.2
      - OllamaSettings__EmbeddingModel=bge-m3
    ports:
      - "5000:8080"
    depends_on:
      ollama-init:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: ui
    container_name: aixp-ui
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  ollama_data:
